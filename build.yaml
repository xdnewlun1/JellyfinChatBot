  ## v1.1.1.0
  - Strengthened system prompt to enforce tool calling before responding
  - LLM no longer skips tools and fabricates recommendations
  - Removed emoji usage from default prompt
  - More concise bot responses

  ## v1.1.0.0
  - Personalized recommendations based on watch history
  - TMDB discovery: find movies/TV by genre, year, rating, popularity
  - "Similar to" recommendations via TMDB
  - Enhanced library search: filter by year range, tags, community rating
  - Library results now include genres and ratings
  - TMDB configuration section in plugin settings

